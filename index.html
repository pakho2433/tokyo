<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Tokyo Streets 3D — 東京步行（渋谷）</title>
  <meta name="description" content="澀谷 3D 步行：日本街景、便利店進店、鐵路站、日語廣播音效" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loading">
    <div class="load-card">
      <div class="logo">TOKYO STREETS</div>
      <div class="sub">渋谷 · 便利店進店音樂 · 鉄道月台 · 日語廣播 · 人中之龍風細緻街景</div>
      <div class="bar"><div id="load-fill"></div></div>
      <div id="load-text">初始化引擎…</div>
      <div class="hint">街上可見 FamilyMart／7-Eleven／LAWSON · 按 E 進店聽歡迎音樂<br/>走近 渋谷駅 進入鐵路月台 · 列車到站有メロディ與日語提醒</div>
    </div>
  </div>

  <div id="hud">
    <div id="minimap-wrap">
      <canvas id="minimap" width="120" height="120"></canvas>
      <div class="mm-label">SHIBUYA</div>
    </div>
    <div id="info">
      <div id="district">渋谷 · Shibuya</div>
      <div id="tod-row">
        <span id="clock">18:30</span>
        <span id="phase">夕方 Dusk</span>
      </div>
      <div id="coords">—</div>
      <div id="fps">— fps</div>
      <div id="zone-badge" class="hidden"></div>
    </div>
    <div id="hud-actions">
      <button id="btn-tod" type="button" title="快轉日夜（+6小時）">昼夜</button>
      <button id="btn-mute" type="button" title="音效（點一下開聲）">🔊</button>
      <button id="btn-loc" type="button" title="重置位置">📍</button>
    </div>
  </div>

  <div id="interact-prompt" class="hidden" role="button" tabindex="0"></div>

  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-stick"></div>
    </div>
    <div class="joy-label">WALK</div>
  </div>

  <div id="look-hint">右側滑動環視 · E 進出店／駅</div>

  <canvas id="c"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
  <script>
    // If modules fail (CDN/network), show a clear error instead of stuck text
    window.addEventListener('error', function (e) {
      var t = document.getElementById('load-text');
      if (t && e && e.message) t.textContent = '載入失敗：' + e.message;
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      var t = document.getElementById('load-text');
      if (t) t.textContent = '載入失敗：' + ((e && e.reason && e.reason.message) || '未知錯誤');
    });
    // Still stuck after 18s → offer light mode (fewer buildings) so phones can play
    setTimeout(function () {
      var loading = document.getElementById('loading');
      var t = document.getElementById('load-text');
      if (!loading || loading.classList.contains('hidden') || !t) return;
      if (t.textContent.indexOf('完成') >= 0 || t.textContent.indexOf('載入失敗') >= 0) return;
      if (location.search.indexOf('light=1') >= 0) {
        t.textContent = t.textContent + '（仍卡住可強制重新整理）';
        return;
      }
      t.innerHTML = '載入太慢？點此用輕量模式開啟（較少建築，更快）';
      t.style.cursor = 'pointer';
      t.style.textDecoration = 'underline';
      t.onclick = function () {
        var u = new URL(location.href);
        u.searchParams.set('light', '1');
        location.replace(u.toString());
      };
    }, 18000);
  </script>
</body>
</html>
